<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>AI Investment OS Lite</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3248;
    --accent: #4f6ef7;
    --accent2: #7c5cfc;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #eab308;
    --text: #e8eaf0;
    --muted: #8b90a8;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    padding-bottom: 80px;
  }

  /* NAV */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 430px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 8px 0 12px;
    z-index: 100;
  }
  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    padding: 6px 0;
    color: var(--muted);
    font-size: 11px;
    transition: color .2s;
  }
  .nav-item.active { color: var(--accent); }
  .nav-item svg { width: 22px; height: 22px; }

  /* HEADER */
  .header {
    padding: 20px 20px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header h1 { font-size: 20px; font-weight: 700; }
  .header .date { font-size: 13px; color: var(--muted); }
  .logo-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    display: inline-block;
    margin-right: 6px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .4; }
  }

  /* PAGES */
  .page { display: none; padding: 16px 20px; }
  .page.active { display: block; }

  /* CARDS */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }
  .card-title {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--muted);
    margin-bottom: 10px;
  }

  /* DAILY BRIEF */
  .brief-status {
    text-align: center;
    padding: 28px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 12px;
  }
  .brief-icon { font-size: 52px; margin-bottom: 12px; }
  .brief-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
  .brief-sub { font-size: 14px; color: var(--muted); line-height: 1.6; }
  .status-calm { border-color: var(--green); }
  .status-attention { border-color: var(--yellow); }
  .status-action { border-color: var(--accent); }

  /* CHIPS */
  .chip {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    margin: 3px 3px 3px 0;
  }
  .chip-green { background: rgba(34,197,94,.15); color: var(--green); }
  .chip-red { background: rgba(239,68,68,.15); color: var(--red); }
  .chip-blue { background: rgba(79,110,247,.15); color: var(--accent); }
  .chip-yellow { background: rgba(234,179,8,.15); color: var(--yellow); }
  .chip-purple { background: rgba(124,92,252,.15); color: var(--accent2); }

  /* PORTFOLIO */
  .stock-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .stock-row:last-child { border-bottom: none; }
  .stock-symbol { font-size: 16px; font-weight: 700; }
  .stock-name { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .stock-right { text-align: right; }
  .stock-value { font-size: 15px; font-weight: 600; }
  .stock-pnl { font-size: 12px; margin-top: 2px; }
  .positive { color: var(--green); }
  .negative { color: var(--red); }

  /* TOTAL */
  .total-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
  }
  .total-label { font-size: 13px; color: var(--muted); }
  .total-value { font-size: 24px; font-weight: 700; }
  .total-pnl { font-size: 14px; }

  /* WATCHLIST */
  .watch-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .watch-row:last-child { border-bottom: none; }
  .watch-price { font-size: 16px; font-weight: 600; }
  .watch-target { font-size: 12px; color: var(--muted); }
  .target-met { color: var(--green); font-weight: 700; }

  /* TRANSACTIONS */
  .tx-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .tx-row:last-child { border-bottom: none; }
  .tx-date { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .tx-desc { font-size: 14px; }
  .tx-amount { font-size: 15px; font-weight: 600; text-align: right; }
  .tx-shares { font-size: 12px; color: var(--muted); text-align: right; margin-top: 2px; }

  /* FORMS */
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 13px; color: var(--muted); margin-bottom: 6px; display: block; }
  .form-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 15px;
    padding: 10px 12px;
    outline: none;
    transition: border-color .2s;
  }
  .form-input:focus { border-color: var(--accent); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  select.form-input { cursor: pointer; }

  /* BUTTONS */
  .btn {
    width: 100%;
    padding: 13px;
    border-radius: var(--radius-sm);
    font-size: 15px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    transition: opacity .2s;
  }
  .btn:active { opacity: .8; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-danger { background: rgba(239,68,68,.15); color: var(--red); border: 1px solid rgba(239,68,68,.3); }
  .btn-sm {
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    background: var(--surface2);
    color: var(--muted);
  }

  /* FAB */
  .fab {
    position: fixed;
    bottom: 88px;
    right: calc(50% - 215px + 20px);
    width: 52px; height: 52px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    border: none;
    font-size: 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(79,110,247,.4);
    z-index: 99;
    transition: transform .2s;
  }
  .fab:active { transform: scale(.93); }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.6);
    z-index: 200;
    align-items: flex-end;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: var(--radius) var(--radius) 0 0;
    padding: 20px 20px 32px;
    width: 100%;
    max-width: 430px;
    margin: 0 auto;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-title {
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-close {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 22px;
    cursor: pointer;
    padding: 0 4px;
  }

  /* SECTION TITLE */
  .section-title {
    font-size: 17px;
    font-weight: 700;
    margin: 20px 0 10px;
  }

  /* AI BADGE */
  .ai-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: linear-gradient(135deg, rgba(79,110,247,.2), rgba(124,92,252,.2));
    border: 1px solid rgba(79,110,247,.3);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
  }

  /* INSIGHT LIST */
  .insight-item {
    display: flex;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .insight-item:last-child { border-bottom: none; }
  .insight-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
  .insight-text { font-size: 14px; line-height: 1.5; color: var(--muted); }
  .insight-text strong { color: var(--text); }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 14px;
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }

  /* PROGRESS BAR */
  .progress-bar { background: var(--surface2); border-radius: 4px; height: 6px; overflow: hidden; margin-top: 8px; }
  .progress-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width .6s; }

  /* ALLOCATION */
  .alloc-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .alloc-label { font-size: 13px; }
  .alloc-pct { font-size: 13px; font-weight: 600; color: var(--muted); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #333;
    color: #fff;
    padding: 10px 20px;
    border-radius: 24px;
    font-size: 14px;
    opacity: 0;
    transition: all .3s;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* SETTINGS */
  .setting-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
  }
  .setting-row:last-child { border-bottom: none; }
  .setting-label { font-size: 15px; }
  .setting-value { font-size: 14px; color: var(--muted); }

  /* TOGGLE */
  .toggle { width: 44px; height: 24px; background: var(--surface2); border-radius: 12px; cursor: pointer; position: relative; transition: background .2s; }
  .toggle.on { background: var(--accent); }
  .toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; border-radius: 50%; background: #fff; transition: left .2s; }
  .toggle.on::after { left: 22px; }

  @media (max-width: 380px) {
    .brief-title { font-size: 17px; }
    .total-value { font-size: 20px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div>
    <h1><span class="logo-dot"></span>Investment OS</h1>
    <div class="date" id="headerDate"></div>
  </div>
  <span class="ai-badge">✦ AI</span>
</div>

<!-- PAGES -->
<div id="page-home" class="page active">
  <div id="dailyBrief"></div>
  <div id="aiInsights"></div>
  <div id="portfolioSummaryHome"></div>
</div>

<div id="page-portfolio" class="page">
  <div id="portfolioView"></div>
</div>

<div id="page-watchlist" class="page">
  <div id="watchlistView"></div>
</div>

<div id="page-history" class="page">
  <div id="historyView"></div>
</div>

<div id="page-settings" class="page">
  <div id="settingsView"></div>
</div>

<!-- FAB -->
<button class="fab" id="fabBtn" title="新增">＋</button>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <div class="nav-item active" data-page="home">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    今日
  </div>
  <div class="nav-item" data-page="portfolio">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg>
    持倉
  </div>
  <div class="nav-item" data-page="watchlist">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
    觀察
  </div>
  <div class="nav-item" data-page="history">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    紀錄
  </div>
  <div class="nav-item" data-page="settings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    設定
  </div>
</nav>

<!-- MODALS -->
<div class="modal-overlay" id="modalTx">
  <div class="modal">
    <div class="modal-title">
      <span>新增交易</span>
      <button class="modal-close" onclick="closeModal('modalTx')">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">交易類型</label>
      <select class="form-input" id="txType">
        <option value="buy">買入</option>
        <option value="sell">賣出</option>
      </select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">股票代號</label>
        <input class="form-input" id="txSymbol" placeholder="例：0050" maxlength="8">
      </div>
      <div class="form-group">
        <label class="form-label">股票名稱</label>
        <input class="form-input" id="txName" placeholder="例：台灣50">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">股數（支援零股）</label>
        <input class="form-input" id="txShares" type="number" placeholder="例：100" min="1">
      </div>
      <div class="form-group">
        <label class="form-label">成交價格（元）</label>
        <input class="form-input" id="txPrice" type="number" placeholder="例：185" step="0.01" min="0">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">交易日期</label>
      <input class="form-input" id="txDate" type="date">
    </div>
    <div class="form-group">
      <label class="form-label">備註（選填）</label>
      <input class="form-input" id="txNote" placeholder="例：定期定額買入">
    </div>
    <button class="btn btn-primary" onclick="addTransaction()">確認新增</button>
  </div>
</div>

<div class="modal-overlay" id="modalWatch">
  <div class="modal">
    <div class="modal-title">
      <span>加入觀察清單</span>
      <button class="modal-close" onclick="closeModal('modalWatch')">✕</button>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">股票代號</label>
        <input class="form-input" id="watchSymbol" placeholder="例：2330" maxlength="8">
      </div>
      <div class="form-group">
        <label class="form-label">股票名稱</label>
        <input class="form-input" id="watchName" placeholder="例：台積電">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">現價（元）</label>
        <input class="form-input" id="watchCurrent" type="number" placeholder="例：920" step="0.01" min="0">
      </div>
      <div class="form-group">
        <label class="form-label">目標買入價（元）</label>
        <input class="form-input" id="watchTarget" type="number" placeholder="例：850" step="0.01" min="0">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">備註（選填）</label>
      <input class="form-input" id="watchNote" placeholder="例：等待回調再買">
    </div>
    <button class="btn btn-primary" onclick="addWatchItem()">加入觀察</button>
  </div>
</div>

<div class="modal-overlay" id="modalUpdatePrice">
  <div class="modal">
    <div class="modal-title">
      <span id="updatePriceTitle">更新現價</span>
      <button class="modal-close" onclick="closeModal('modalUpdatePrice')">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">現在市價（元）</label>
      <input class="form-input" id="updatePriceValue" type="number" step="0.01" min="0">
    </div>
    <input type="hidden" id="updatePriceId">
    <input type="hidden" id="updatePriceType">
    <button class="btn btn-primary" onclick="confirmUpdatePrice()">確認更新</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ─── DATA LAYER ────────────────────────────────────────────────
const DB = {
  get(key, def) { try { return JSON.parse(localStorage.getItem('ios_' + key)) ?? def; } catch { return def; } },
  set(key, val) { localStorage.setItem('ios_' + key, JSON.stringify(val)); }
};

const State = {
  get portfolio() { return DB.get('portfolio', []); },
  set portfolio(v) { DB.set('portfolio', v); },
  get watchlist() { return DB.get('watchlist', []); },
  set watchlist(v) { DB.set('watchlist', v); },
  get transactions() { return DB.get('transactions', []); },
  set transactions(v) { DB.set('transactions', v); },
  get settings() { return DB.get('settings', { monthlyBudget: 10000, dca: true, reminderDay: 5 }); },
  set settings(v) { DB.set('settings', v); },
};

// ─── SEED DEMO DATA ─────────────────────────────────────────────
function seedIfEmpty() {
  if (State.portfolio.length > 0) return;
  const now = new Date();
  const m = (n) => { let d = new Date(now); d.setDate(d.getDate() - n); return d.toISOString().slice(0,10); };

  State.transactions = [
    { id: 1, date: m(120), symbol: '0050', name: '台灣50', type: 'buy', shares: 100, price: 175, note: '定期定額' },
    { id: 2, date: m(90),  symbol: '0050', name: '台灣50', type: 'buy', shares: 50,  price: 180, note: '加碼' },
    { id: 3, date: m(60),  symbol: '0056', name: '高股息', type: 'buy', shares: 200, price: 34,  note: '領息策略' },
    { id: 4, date: m(30),  symbol: '2330', name: '台積電', type: 'buy', shares: 10,  price: 910, note: '零股買入' },
    { id: 5, date: m(15),  symbol: '0050', name: '台灣50', type: 'buy', shares: 30,  price: 182, note: '定期定額' },
  ];

  State.portfolio = [
    { id: 1, symbol: '0050', name: '台灣50',   shares: 180, avgCost: 177.2, currentPrice: 189 },
    { id: 2, symbol: '0056', name: '高股息',   shares: 200, avgCost: 34.0,  currentPrice: 36.5 },
    { id: 3, symbol: '2330', name: '台積電',   shares: 10,  avgCost: 910.0, currentPrice: 965 },
  ];

  State.watchlist = [
    { id: 1, symbol: '006208', name: '富邦台50', currentPrice: 102, targetPrice: 95,  note: '等低點加碼' },
    { id: 2, symbol: '00878',  name: '國泰永續', currentPrice: 22.5, targetPrice: 21, note: '長期持有候選' },
  ];
}

// ─── HELPERS ────────────────────────────────────────────────────
function fmt(n, decimals = 0) {
  return n.toLocaleString('zh-TW', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}
function fmtDate(d) {
  const dt = new Date(d + 'T00:00:00');
  return `${dt.getMonth()+1}/${dt.getDate()}`;
}
function uid() { return Date.now() + Math.random().toString(36).slice(2, 6); }

function showToast(msg, ms = 2200) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}

function pnlClass(v) { return v >= 0 ? 'positive' : 'negative'; }
function pnlSign(v) { return v >= 0 ? '+' : ''; }

// ─── NAVIGATION ─────────────────────────────────────────────────
let currentPage = 'home';
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    currentPage = item.dataset.page;
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    item.classList.add('active');
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + currentPage).classList.add('active');
    renderCurrentPage();
  });
});

function renderCurrentPage() {
  if (currentPage === 'home') renderHome();
  else if (currentPage === 'portfolio') renderPortfolio();
  else if (currentPage === 'watchlist') renderWatchlist();
  else if (currentPage === 'history') renderHistory();
  else if (currentPage === 'settings') renderSettings();
}

// ─── FAB ─────────────────────────────────────────────────────────
document.getElementById('fabBtn').addEventListener('click', () => {
  if (currentPage === 'watchlist') openModal('modalWatch');
  else openModal('modalTx');
});

// ─── MODALS ──────────────────────────────────────────────────────
function openModal(id) {
  document.getElementById(id).classList.add('open');
  if (id === 'modalTx') {
    document.getElementById('txDate').value = new Date().toISOString().slice(0, 10);
  }
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});

// ─── AI ENGINE ───────────────────────────────────────────────────
function generateInsights() {
  const portfolio = State.portfolio;
  const watchlist = State.watchlist;
  const settings = State.settings;
  const insights = [];
  let actionCount = 0;

  // Check watchlist targets
  watchlist.forEach(w => {
    if (w.currentPrice && w.targetPrice && w.currentPrice <= w.targetPrice) {
      insights.push({
        icon: '🎯',
        text: `<strong>${w.symbol} ${w.name}</strong> 現價 $${fmt(w.currentPrice)} 已達您的目標買入價 $${fmt(w.targetPrice)}，可考慮建立部位。`,
        priority: 1
      });
      actionCount++;
    }
  });

  // DCA reminder (monthly budget)
  const now = new Date();
  const day = now.getDate();
  if (day >= settings.reminderDay && day <= settings.reminderDay + 5) {
    insights.push({
      icon: '📅',
      text: `本月定期定額提醒：預算 <strong>$${fmt(settings.monthlyBudget)}</strong>，今天是好時機確認是否已執行本月投入。`,
      priority: 2
    });
    actionCount++;
  }

  // Portfolio diversification
  if (portfolio.length > 0) {
    const totalValue = portfolio.reduce((s, h) => s + h.shares * (h.currentPrice || h.avgCost), 0);
    portfolio.forEach(h => {
      const val = h.shares * (h.currentPrice || h.avgCost);
      const pct = val / totalValue * 100;
      if (pct > 60) {
        insights.push({
          icon: '⚖️',
          text: `<strong>${h.symbol} ${h.name}</strong> 佔您投資組合的 ${fmt(pct, 1)}%，集中度偏高。長期來看可考慮分散配置。`,
          priority: 3
        });
      }
    });
  }

  // Positive reinforcement
  const winners = portfolio.filter(h => h.currentPrice && h.currentPrice > h.avgCost);
  if (winners.length > 0 && actionCount === 0) {
    const best = winners.reduce((a, b) =>
      (b.currentPrice / b.avgCost) > (a.currentPrice / a.avgCost) ? b : a
    );
    const pct = (best.currentPrice / best.avgCost - 1) * 100;
    insights.push({
      icon: '📈',
      text: `<strong>${best.symbol} ${best.name}</strong> 目前報酬率 <strong class="positive">+${fmt(pct, 1)}%</strong>，持續持有長期投資策略執行中。`,
      priority: 4
    });
  }

  return { insights, actionCount };
}

// ─── HOME PAGE ───────────────────────────────────────────────────
function renderHome() {
  const { insights, actionCount } = generateInsights();
  const portfolio = State.portfolio;

  // Daily brief
  let statusClass, icon, title, sub;
  if (actionCount === 0) {
    statusClass = 'status-calm';
    icon = '😌';
    title = '今天不用交易';
    sub = '市場平靜，安心生活。<br>長期投資的力量在於耐心等待。';
  } else if (actionCount === 1) {
    statusClass = 'status-attention';
    icon = '👀';
    title = '有一件事值得關注';
    sub = '有個訊號值得您花 1 分鐘確認。';
  } else {
    statusClass = 'status-action';
    icon = '📋';
    title = `有 ${actionCount} 件事需要確認`;
    sub = '請花 3 分鐘檢視以下建議。';
  }

  document.getElementById('dailyBrief').innerHTML = `
    <div class="brief-status ${statusClass}">
      <div class="brief-icon">${icon}</div>
      <div class="brief-title">${title}</div>
      <div class="brief-sub">${sub}</div>
    </div>
  `;

  // AI Insights
  if (insights.length > 0) {
    const items = insights.map(i => `
      <div class="insight-item">
        <div class="insight-icon">${i.icon}</div>
        <div class="insight-text">${i.text}</div>
      </div>
    `).join('');
    document.getElementById('aiInsights').innerHTML = `
      <div class="card">
        <div class="card-title">AI 分析</div>
        ${items}
      </div>
    `;
  } else {
    document.getElementById('aiInsights').innerHTML = '';
  }

  // Portfolio mini summary
  if (portfolio.length > 0) {
    const totalCost = portfolio.reduce((s, h) => s + h.shares * h.avgCost, 0);
    const totalValue = portfolio.reduce((s, h) => s + h.shares * (h.currentPrice || h.avgCost), 0);
    const totalPnl = totalValue - totalCost;
    const totalPnlPct = totalPnl / totalCost * 100;
    document.getElementById('portfolioSummaryHome').innerHTML = `
      <div class="card">
        <div class="card-title">持倉概覽</div>
        <div class="total-row">
          <span class="total-label">總市值</span>
          <span class="total-value">$${fmt(totalValue)}</span>
        </div>
        <div class="total-row">
          <span class="total-label">總損益</span>
          <span class="total-pnl ${pnlClass(totalPnl)}">${pnlSign(totalPnl)}$${fmt(Math.abs(totalPnl))} (${pnlSign(totalPnlPct)}${fmt(totalPnlPct, 2)}%)</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" style="width:${Math.min(100, Math.max(0, totalPnlPct + 50))}%"></div>
        </div>
      </div>
    `;
  } else {
    document.getElementById('portfolioSummaryHome').innerHTML = '';
  }
}

// ─── PORTFOLIO PAGE ───────────────────────────────────────────────
function renderPortfolio() {
  const portfolio = State.portfolio;
  const el = document.getElementById('portfolioView');

  if (portfolio.length === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📂</div>還沒有持倉<br>點下方 ＋ 新增第一筆交易</div>`;
    return;
  }

  const totalCost = portfolio.reduce((s, h) => s + h.shares * h.avgCost, 0);
  const totalValue = portfolio.reduce((s, h) => s + h.shares * (h.currentPrice || h.avgCost), 0);
  const totalPnl = totalValue - totalCost;
  const totalPnlPct = totalPnl / totalCost * 100;

  const rows = portfolio.map(h => {
    const mktVal = h.shares * (h.currentPrice || h.avgCost);
    const pnl = mktVal - h.shares * h.avgCost;
    const pnlPct = pnl / (h.shares * h.avgCost) * 100;
    const alloc = mktVal / totalValue * 100;
    return `
      <div class="stock-row" onclick="openUpdatePrice('${h.id}','portfolio')">
        <div>
          <div class="stock-symbol">${h.symbol}</div>
          <div class="stock-name">${h.name} · ${fmt(h.shares)} 股</div>
          <div style="margin-top:5px">
            <span class="chip chip-blue">均價 $${fmt(h.avgCost, 2)}</span>
            <span class="chip chip-purple">${fmt(alloc, 1)}%</span>
          </div>
        </div>
        <div class="stock-right">
          <div class="stock-value">$${fmt(mktVal)}</div>
          <div class="stock-pnl ${pnlClass(pnl)}">${pnlSign(pnl)}${fmt(pnlPct, 2)}%</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">現價 $${fmt(h.currentPrice || h.avgCost, 2)}</div>
        </div>
      </div>
    `;
  }).join('');

  // Allocation bars
  const allocBars = portfolio.map(h => {
    const mktVal = h.shares * (h.currentPrice || h.avgCost);
    const pct = mktVal / totalValue * 100;
    return `
      <div class="alloc-row">
        <div class="alloc-label">${h.symbol} ${h.name}</div>
        <div class="alloc-pct">${fmt(pct, 1)}%</div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div style="margin-bottom:8px"></div>
    `;
  }).join('');

  el.innerHTML = `
    <div class="card">
      <div class="card-title">總覽</div>
      <div class="total-row">
        <span class="total-label">投入成本</span>
        <span style="font-size:15px">$${fmt(totalCost)}</span>
      </div>
      <div class="total-row">
        <span class="total-label">現在市值</span>
        <span class="total-value">$${fmt(totalValue)}</span>
      </div>
      <div class="total-row">
        <span class="total-label">未實現損益</span>
        <span class="total-pnl ${pnlClass(totalPnl)}">${pnlSign(totalPnl)}$${fmt(Math.abs(totalPnl))} (${pnlSign(totalPnlPct)}${fmt(totalPnlPct, 2)}%)</span>
      </div>
    </div>
    <div class="card">
      <div class="card-title">持股明細 <span style="font-size:11px;color:var(--muted)">點擊更新現價</span></div>
      ${rows}
    </div>
    <div class="card">
      <div class="card-title">資產配置</div>
      ${allocBars}
    </div>
  `;
}

// ─── WATCHLIST PAGE ───────────────────────────────────────────────
function renderWatchlist() {
  const watchlist = State.watchlist;
  const el = document.getElementById('watchlistView');

  if (watchlist.length === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">👁️</div>觀察清單是空的<br>點下方 ＋ 加入想追蹤的股票</div>`;
    return;
  }

  const rows = watchlist.map(w => {
    const diff = w.targetPrice ? ((w.currentPrice / w.targetPrice - 1) * 100) : null;
    const met = w.currentPrice && w.targetPrice && w.currentPrice <= w.targetPrice;
    const diffText = diff !== null
      ? `距目標 ${diff > 0 ? '+' : ''}${fmt(diff, 1)}%`
      : '未設目標價';
    return `
      <div class="watch-row">
        <div>
          <div class="stock-symbol">${w.symbol}</div>
          <div class="stock-name">${w.name}</div>
          ${w.note ? `<div style="font-size:12px;color:var(--muted);margin-top:4px">${w.note}</div>` : ''}
        </div>
        <div style="text-align:right">
          <div class="watch-price ${met ? 'target-met' : ''}" onclick="openUpdatePrice('${w.id}','watch')" style="cursor:pointer">
            $${fmt(w.currentPrice || 0, 2)}
            ${met ? ' 🎯' : ''}
          </div>
          <div class="watch-target">目標 $${w.targetPrice ? fmt(w.targetPrice, 2) : '—'}</div>
          <div style="font-size:12px;margin-top:4px" class="${met ? 'positive' : 'negative'}">${diffText}</div>
          <button class="btn-sm" onclick="removeWatch('${w.id}')" style="margin-top:6px">移除</button>
        </div>
      </div>
    `;
  }).join('');

  el.innerHTML = `
    <div class="card">
      <div class="card-title">觀察清單 <span style="font-size:11px;color:var(--muted)">點價格更新</span></div>
      ${rows}
    </div>
  `;
}

// ─── HISTORY PAGE ─────────────────────────────────────────────────
function renderHistory() {
  const txs = [...State.transactions].sort((a, b) => b.date.localeCompare(a.date));
  const el = document.getElementById('historyView');

  if (txs.length === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📋</div>還沒有交易紀錄</div>`;
    return;
  }

  const rows = txs.map(tx => {
    const isBuy = tx.type === 'buy';
    const amount = tx.shares * tx.price;
    return `
      <div class="tx-row">
        <div>
          <div class="tx-date">${tx.date} ${fmtDate(tx.date)}</div>
          <div class="tx-desc">
            <span class="chip ${isBuy ? 'chip-blue' : 'chip-red'}">${isBuy ? '買入' : '賣出'}</span>
            ${tx.symbol} ${tx.name}
          </div>
          ${tx.note ? `<div style="font-size:12px;color:var(--muted);margin-top:4px">${tx.note}</div>` : ''}
        </div>
        <div>
          <div class="tx-amount ${isBuy ? 'negative' : 'positive'}">${isBuy ? '-' : '+'}$${fmt(amount)}</div>
          <div class="tx-shares">${fmt(tx.shares)} 股 @ $${fmt(tx.price, 2)}</div>
          <button class="btn-sm" onclick="deleteTx('${tx.id}')" style="margin-top:6px">刪除</button>
        </div>
      </div>
    `;
  }).join('');

  const totalIn = txs.filter(t => t.type === 'buy').reduce((s, t) => s + t.shares * t.price, 0);
  const totalOut = txs.filter(t => t.type === 'sell').reduce((s, t) => s + t.shares * t.price, 0);

  el.innerHTML = `
    <div class="card">
      <div class="card-title">統計</div>
      <div class="total-row">
        <span class="total-label">總投入</span>
        <span style="color:var(--red)">$${fmt(totalIn)}</span>
      </div>
      <div class="total-row">
        <span class="total-label">總賣出</span>
        <span style="color:var(--green)">$${fmt(totalOut)}</span>
      </div>
      <div class="total-row">
        <span class="total-label">交易筆數</span>
        <span>${txs.length} 筆</span>
      </div>
    </div>
    <div class="card">
      <div class="card-title">交易明細</div>
      ${rows}

}

    <div class="card">
      <div class="card-title">投資設定</div>
      <div class="setting-row">
        <span class="setting-label">每月投資預算</span>

        <span class="setting-label">定期提醒日（每月）</span>

      </div>
    </div>
    <div class="card">
      <div class="card-title">關於</div>
      <div class="insight-item">
        <div class="insight-icon">✦</div>
        <div class="insight-text"><strong>AI Investment OS Lite v1.0</strong><br>專為小資族設計的投資紀律助理。<br>每天 3 分鐘，建立長期投資習慣。</div>

    </div>
  `;
}

function editSetting(key, label, current) {
  const val = prompt(label, current);
  if (val === null) return;
  const num = parseFloat(val);
  if (isNaN(num) || num <= 0) { showToast('請輸入有效數字'); return; }
  const s = State.settings;
  s[key] = Math.round(num);
  State.settings = s;
  renderSettings();
  showToast('已更新');
}

function clearAllData() {
  if (!confirm('確定要清除所有資料？此操作無法復原。')) return;
  ['portfolio','watchlist','transactions','settings'].forEach(k => localStorage.removeItem('ios_' + k));
  showToast('資料已清除');
  seedIfEmpty();
  renderCurrentPage();
}

// ─── ACTIONS ─────────────────────────────────────────────────────
function addTransaction() {
  const type = document.getElementById('txType').value;
  const symbol = document.getElementById('txSymbol').value.trim().toUpperCase();
  const name = document.getElementById('txName').value.trim();
  const shares = parseFloat(document.getElementById('txShares').value);
  const price = parseFloat(document.getElementById('txPrice').value);
  const date = document.getElementById('txDate').value;
  const note = document.getElementById('txNote').value.trim();

  if (!symbol || !name || !shares || !price || !date) { showToast('請填寫所有必要欄位'); return; }
  if (shares <= 0 || price <= 0) { showToast('股數與價格須大於 0'); return; }

  const tx = { id: uid(), date, symbol, name, type, shares, price, note };
  State.transactions = [...State.transactions, tx];

  // Update portfolio
  const portfolio = State.portfolio;
  const existing = portfolio.find(h => h.symbol === symbol);
  if (type === 'buy') {
    if (existing) {
      const totalCost = existing.shares * existing.avgCost + shares * price;
      existing.shares += shares;
      existing.avgCost = totalCost / existing.shares;
      if (!existing.currentPrice) existing.currentPrice = price;
      State.portfolio = portfolio;
    } else {
      State.portfolio = [...portfolio, { id: uid(), symbol, name, shares, avgCost: price, currentPrice: price }];
    }
  } else if (type === 'sell' && existing) {
    existing.shares -= shares;
    if (existing.shares <= 0) {
      State.portfolio = portfolio.filter(h => h.symbol !== symbol);
    } else {
      State.portfolio = portfolio;
    }
  }

  // Clear form
  ['txSymbol','txName','txShares','txPrice','txNote'].forEach(id => document.getElementById(id).value = '');
  closeModal('modalTx');
  showToast(`已新增 ${type === 'buy' ? '買入' : '賣出'} ${symbol}`);
  renderCurrentPage();
}

function addWatchItem() {
  const symbol = document.getElementById('watchSymbol').value.trim().toUpperCase();
  const name = document.getElementById('watchName').value.trim();
  const currentPrice = parseFloat(document.getElementById('watchCurrent').value) || 0;
  const targetPrice = parseFloat(document.getElementById('watchTarget').value) || 0;
  const note = document.getElementById('watchNote').value.trim();

  if (!symbol || !name) { showToast('請填寫股票代號與名稱'); return; }

  State.watchlist = [...State.watchlist, { id: uid(), symbol, name, currentPrice, targetPrice, note }];
  ['watchSymbol','watchName','watchCurrent','watchTarget','watchNote'].forEach(id => document.getElementById(id).value = '');
  closeModal('modalWatch');
  showToast(`已加入觀察：${symbol}`);
  renderWatchlist();
}

function removeWatch(id) {
  State.watchlist = State.watchlist.filter(w => w.id != id);
  showToast('已從觀察清單移除');
  renderWatchlist();
}

function deleteTx(id) {
  if (!confirm('確定刪除此交易紀錄？')) return;
  State.transactions = State.transactions.filter(t => t.id != id);
  showToast('交易紀錄已刪除');
  renderHistory();
}

function openUpdatePrice(id, type) {
  const items = type === 'portfolio' ? State.portfolio : State.watchlist;
  const item = items.find(i => i.id == id);
  if (!item) return;
  document.getElementById('updatePriceTitle').textContent = `更新現價：${item.symbol} ${item.name}`;
  document.getElementById('updatePriceValue').value = item.currentPrice || '';
  document.getElementById('updatePriceId').value = id;
  document.getElementById('updatePriceType').value = type;
  openModal('modalUpdatePrice');
}

function confirmUpdatePrice() {
  const id = document.getElementById('updatePriceId').value;
  const type = document.getElementById('updatePriceType').value;
  const price = parseFloat(document.getElementById('updatePriceValue').value);
  if (!price || price <= 0) { showToast('請輸入有效價格'); return; }

  if (type === 'portfolio') {
    const portfolio = State.portfolio;
    const item = portfolio.find(i => i.id == id);
    if (item) { item.currentPrice = price; State.portfolio = portfolio; }
  } else {
    const watchlist = State.watchlist;
    const item = watchlist.find(i => i.id == id);
    if (item) { item.currentPrice = price; State.watchlist = watchlist; }
  }
  closeModal('modalUpdatePrice');
  showToast('現價已更新');
  renderCurrentPage();
}

// ─── INIT ─────────────────────────────────────────────────────────
function init() {
  // Date header
  const now = new Date();
  const days = ['日','一','二','三','四','五','六'];
  document.getElementById('headerDate').textContent =
    `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} 週${days[now.getDay()]}`;

  seedIfEmpty();
  renderHome();
}

init();
</script>
